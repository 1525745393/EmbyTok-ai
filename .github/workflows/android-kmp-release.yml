# ============================================
# EmbyTok KMP Android 发布工作流
# ============================================
name: KMP Android Release

on:
  release:
    types: [published]
  push:
    tags:
      - 'kmp-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag - 版本标签，例如 kmp-v1.0.0'
        required: true
      prerelease:
        description: '是否作为预发布版本'
        required: false
        default: 'false'

permissions:
  contents: write

env:
  GRADLE_VERSION: 8.7
  JAVA_VERSION: '17'

jobs:
  # -------------------------------------------
  # 任务1: 构建 Debug APK
  # -------------------------------------------
  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}
          cache-read-only: false

      - name: Build Debug APK
        run: |
          cd android-kmp
          gradle assembleDebug --no-daemon --stacktrace

      - name: Determine version
        id: version
        run: |
          VERSION="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION=${VERSION#refs/tags/}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "版本: $VERSION"

      - name: Rename APK
        run: |
          VERSION=${{ steps.version.outputs.version }}
          mkdir -p output
          mv android-kmp/android/app/build/outputs/apk/debug/app-debug.apk "output/EmbyTok-KMP-$VERSION-debug.apk"

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: kmp-debug-apk
          path: output/*.apk
          retention-days: 30

  # -------------------------------------------
  # 任务2: 构建 Release APK
  # -------------------------------------------
  build-release:
    name: Build Release APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}
          cache-read-only: false

      - name: Prepare signing
        id: prepare-signing
        run: |
          if [ -n "${{ secrets.ANDROID_KEYSTORE }}" ]; then
            echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 -d > android-kmp/android/app/embytok-release.keystore
            echo "ANDROID_KEYSTORE=1" >> $GITHUB_ENV
            echo "ANDROID_KEYSTORE_PATH=embytok-release.keystore" >> $GITHUB_ENV
            echo "ANDROID_KEYSTORE_PASSWORD=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
            echo "ANDROID_KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}" >> $GITHUB_ENV
            echo "ANDROID_KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}" >> $GITHUB_ENV
            echo "signing_enabled=true" >> $GITHUB_OUTPUT
          else
            echo "signing_enabled=false" >> $GITHUB_OUTPUT
          fi

      - name: Build Release APK
        run: |
          cd android-kmp
          if [ "${{ steps.prepare-signing.outputs.signing_enabled }}" = "true" ]; then
            gradle assembleRelease --no-daemon --stacktrace
          else
            echo "跳过 Release 构建（未配置签名）"
          fi

      - name: Determine version
        id: version
        run: |
          VERSION="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION=${VERSION#refs/tags/}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Rename APK
        if: steps.prepare-signing.outputs.signing_enabled == 'true'
        run: |
          VERSION=${{ steps.version.outputs.version }}
          mkdir -p output
          mv android-kmp/android/app/build/outputs/apk/release/app-release.apk "output/EmbyTok-KMP-$VERSION-release.apk" || true

      - name: Upload Release APK
        if: steps.prepare-signing.outputs.signing_enabled == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: kmp-release-apk
          path: output/*.apk
          retention-days: 30

  # -------------------------------------------
  # 任务3: 创建 Release
  # -------------------------------------------
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-debug, build-release]
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: ls -laR artifacts/

      - name: Determine release type
        id: release-type
        run: |
          PRERELEASE=false
          if [ "${{ github.event_name }}" = "release" ]; then
            PRERELEASE="${{ github.event.release.prerelease }}"
          elif [ "${{ github.event.inputs.prerelease }}" = "true" ]; then
            PRERELEASE=true
          fi
          echo "prerelease=$PRERELEASE" >> $GITHUB_OUTPUT
          echo "发布类型: $PRERELEASE"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/kmp-debug-apk/*.apk
            artifacts/kmp-release-apk/*.apk
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          prerelease: ${{ steps.release-type.outputs.prerelease }}
          body: |
            # EmbyTok KMP v${{ github.event.inputs.tag || github.ref_name }}

            ## 新特性

            - Kotlin Multiplatform 架构
            - 原生 Android 构建

            ## 下载

            - Debug APK: 用于测试
            - Release APK: 正式发布版本（签名版本）

            ## 安装说明

            1. 下载 APK 文件到手机
            2. 在设置中允许安装未知来源应用
            3. 安装并启动应用
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
