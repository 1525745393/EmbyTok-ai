name: Run Tests

on:
  push:
    branches:
      - main
      - 'trae/**'
    paths:
      - '!**'
      - 'src/**'
      - 'components/**'
      - 'services/**'
      - 'hooks/**'
      - 'utils/**'
      - 'scripts/**'
      - 'android/**'
      - 'ios/**'
      - 'package.json'
      - 'tsconfig.json'
      - 'vite.config.ts'
      - '.github/workflows/test.yml'
  pull_request:
    branches:
      - main
    paths:
      - '!**'
      - 'src/**'
      - 'components/**'
      - 'services/**'
      - 'hooks/**'
      - 'utils/**'
      - 'scripts/**'
      - 'android/**'
      - 'ios/**'
      - 'package.json'
      - 'tsconfig.json'
      - 'vite.config.ts'
      - '.github/workflows/test.yml'
  workflow_dispatch: # 允许手动触发

jobs:
  # 作业 1: 运行单元和集成测试
  unit-integration-tests:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript type check
        run: npx tsc --noEmit

      - name: Run unit and integration tests
        run: npm run test:run

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: test-coverage-report
          path: coverage/
          retention-days: 30

  # 作业 2: 运行基准性能测试
  benchmark-tests:
    name: Benchmark Tests
    runs-on: ubuntu-latest
    needs: unit-integration-tests # 依赖单元测试通过后才运行
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run benchmark tests
        run: npm run test:bench

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: bench-results/ # 这是 Vitest Bench 保存结果的默认位置（如果启用）
          retention-days: 30

  # 作业 3: 检查代码格式化
  lint-check:
    name: Code Linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check Prettier formatting
        run: npx prettier --check .
